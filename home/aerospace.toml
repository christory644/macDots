after-login-command = []

after-startup-command = [
  'exec-and-forget borders active_color=0xcc7e57c2 inactive_color=0x3313344f width=10'
]

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
key-mapping.preset = 'qwerty'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = 'move-mouse window-lazy-center'

[gaps]
inner.horizontal = 15
inner.vertical =   15
outer.left =       10
outer.bottom =     10
outer.top =        10
outer.right =      10

[mode.main.binding]
# Launch cmux terminal
alt-enter = 'exec-and-forget open -n /Applications/cmux.app'

cmd-h = [] # disable "hide application"

cmd-alt-slash = 'layout tiles horizontal vertical'
cmd-alt-comma = 'layout accordion horizontal vertical'

# Focus (hjkl)
cmd-alt-h = 'focus left'
cmd-alt-j = 'focus down'
cmd-alt-k = 'focus up'
cmd-alt-l = 'focus right'

# Move windows
cmd-alt-shift-h = 'move left'
cmd-alt-shift-j = 'move down'
cmd-alt-shift-k = 'move up'
cmd-alt-shift-l = 'move right'

# Resize
cmd-alt-shift-minus = 'resize smart -50'
cmd-alt-shift-equal = 'resize smart +50'

# Workspaces — main monitor: 1-5, T, C, W | secondary monitor: 6-9, B
cmd-alt-1 = 'workspace 1'
cmd-alt-2 = 'workspace 2'
cmd-alt-3 = 'workspace 3'
cmd-alt-4 = 'workspace 4'
cmd-alt-5 = 'workspace 5'
cmd-alt-6 = 'workspace 6'
cmd-alt-7 = 'workspace 7'
cmd-alt-8 = 'workspace 8'
cmd-alt-9 = 'workspace 9'
cmd-alt-b = 'workspace B'
cmd-alt-c = 'workspace C'
cmd-alt-t = 'workspace T'
cmd-alt-w = 'workspace W'

# Move to workspace
cmd-alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
cmd-alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
cmd-alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
cmd-alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
cmd-alt-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
cmd-alt-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
cmd-alt-shift-7 = ['move-node-to-workspace 7', 'workspace 7']
cmd-alt-shift-8 = ['move-node-to-workspace 8', 'workspace 8']
cmd-alt-shift-9 = ['move-node-to-workspace 9', 'workspace 9']
cmd-alt-shift-b = ['move-node-to-workspace B', 'workspace B']
cmd-alt-shift-c = ['move-node-to-workspace C', 'workspace C']
cmd-alt-shift-t = ['move-node-to-workspace T', 'workspace T']
cmd-alt-shift-w = ['move-node-to-workspace W', 'workspace W']

cmd-alt-shift-f = 'fullscreen'
cmd-alt-tab = 'workspace-back-and-forth'
cmd-alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

cmd-alt-shift-semicolon = 'mode service'
cmd-alt-shift-r = 'mode resize'

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
b = 'balance-sizes'
esc = 'mode main'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

[workspace-to-monitor-force-assignment]
# Main monitor
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'main'
5 = 'main'
T = 'main'
C = 'main'
W = 'main'
# Secondary monitor
6 = 'secondary'
7 = 'secondary'
8 = 'secondary'
9 = 'secondary'
B = 'secondary'

# Auto-route apps to workspaces
[[on-window-detected]]
if.app-id = 'company.thebrowser.Browser'
run = 'move-node-to-workspace B'

[[on-window-detected]]
if.app-id = 'com.cmuxterm.app'
run = 'move-node-to-workspace T'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace C'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace W'
